<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#19c8b9">
  <title>潮汐孤岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="hud-col hud-col-left">
      <div class="panel panel-minimap" id="minimapPanel">
        <div class="minimap-card">
          <div class="minimap-head">
            <span class="section-title">海图</span>
            <span class="subtle" id="minimapInfo">群岛 0</span>
          </div>
          <canvas id="minimap" class="minimap-canvas" width="208" height="208"></canvas>
          <div class="brand minimap-brand">
            <strong>潮汐孤岛</strong>
            <span id="dayInfo">第 1 天 · 清晨</span>
          </div>
        </div>
      </div>

      <div class="panel panel-status" id="statusPanel">
        <div class="status-card">
          <div class="bars" id="bars"></div>
          <div class="row subtle status-row">
            <span id="weatherInfo">海风平稳</span>
            <span id="scoreInfo">生存评分 0</span>
          </div>
          <div class="message" id="message"></div>
          <div class="hint" id="hint"></div>
          <div class="controls">桌面：WASD 移动 · Shift 冲刺 · 左键行动 · E 交互 · 右键背包菜单<br>移动端：左侧摇杆移动 · 红钮攻击/使用 · 青钮交互 · 黄钮冲刺 · 点击地图瞄准</div>
        </div>
      </div>
    </div>

    <div class="hud-col hud-col-right">
      <div class="panel panel-inventory" id="inventoryPanel">
        <div class="section-title">背包</div>
        <div class="inventory" id="inventory"></div>
      </div>
      <div class="panel panel-craft" id="craftPanel">
        <div class="section-title">制作</div>
        <div class="craft-list" id="craftList"></div>
      </div>
    </div>
  </div>

  <div class="world-target-panel" id="worldTargetPanel"></div>

  <div class="item-tooltip" id="itemTooltip"></div>

  <div class="context-menu" id="itemMenu">
    <div class="context-menu-title" id="itemMenuTitle"></div>
    <button type="button" id="itemMenuUseBtn">使用</button>
    <button type="button" id="itemMenuBindBtn">放入当前快捷栏</button>
    <button type="button" id="itemMenuDropBtn">丢弃 1 个</button>
    <button type="button" id="itemMenuClearBtn">移出快捷栏</button>
  </div>

  <div class="overlay show" id="startOverlay">
    <div class="overlay-card">
      <h1>潮汐孤岛</h1>
      <p>你被困在一座会呼吸的海岛。白天采集木材、石块、纤维与食物；夜晚点燃篝火、搭建防线、对抗从海岸爬上的暗潮生物。</p>
      <ul>
        <li>砍树、采石、搜集灌木与椰子，维持饥饿和口渴。</li>
        <li>先收集材料，再把武器、工具和建造套件制作进背包，并左键切换当前手持。</li>
        <li>夜晚敌人会追踪你，篝火能提供光亮与缓慢恢复。</li>
      </ul>
      <div class="overlay-actions">
        <button class="primary" id="startBtn">开始生存</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-card">
      <h2>营地失守</h2>
      <p id="gameOverText" class="danger-text"></p>
      <div class="overlay-actions">
        <button class="primary" id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>

  <div class="mobile-controls" id="mobileControls" aria-hidden="true">
    <div class="panel-toggles">
      <button type="button" class="panel-toggle" id="togglePanelMinimap" aria-label="海图">🧭</button>
      <button type="button" class="panel-toggle" id="togglePanelInventory" aria-label="背包">🎒</button>
      <button type="button" class="panel-toggle" id="togglePanelCraft" aria-label="制作">🔨</button>
    </div>

    <div class="joystick" id="joystick">
      <div class="joystick-stick" id="joystickStick"></div>
    </div>

    <div class="action-buttons">
      <button type="button" class="action-btn sprint" id="btnSprint" aria-label="冲刺">冲刺</button>
      <button type="button" class="action-btn interact" id="btnInteract" aria-label="交互">交互</button>
      <button type="button" class="action-btn attack" id="btnAttack" aria-label="攻击">攻击</button>
    </div>
  </div>

  <script type="module" src="src/entry.js"></script>
</body>
</html>
