<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮汐孤岛</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="panel left">
      <div class="minimap-card">
        <div class="minimap-head">
          <span class="section-title">海图</span>
          <span class="subtle" id="minimapInfo">群岛 0</span>
        </div>
        <canvas id="minimap" class="minimap-canvas" width="208" height="208"></canvas>
      </div>
      <div class="status-card">
        <div class="brand">
          <strong>潮汐孤岛</strong>
          <span id="dayInfo">第 1 天 · 清晨</span>
        </div>
        <div class="bars" id="bars"></div>
        <div class="row subtle status-row">
          <span id="weatherInfo">海风平稳</span>
          <span id="scoreInfo">生存评分 0</span>
        </div>
        <div class="message" id="message"></div>
        <div class="hint" id="hint"></div>
        <div class="controls">WASD 移动 · Shift 冲刺 · 左键行动 · E 交互 · 滚轮/1-5 切换快捷栏 · 右键背包/快捷栏菜单</div>
      </div>
    </div>

    <div class="panel right">
      <div>
        <div class="section-title">背包</div>
        <div class="inventory" id="inventory"></div>
      </div>
      <div>
        <div class="section-title">制作</div>
        <div class="craft-list" id="craftList"></div>
      </div>
    </div>
  </div>

  <div class="hotbar" id="hotbar"></div>

  <div class="item-tooltip" id="itemTooltip"></div>

  <div class="context-menu" id="itemMenu">
    <div class="context-menu-title" id="itemMenuTitle"></div>
    <button type="button" id="itemMenuUseBtn">使用</button>
    <button type="button" id="itemMenuBindBtn">放入当前快捷栏</button>
    <button type="button" id="itemMenuDropBtn">丢弃 1 个</button>
    <button type="button" id="itemMenuClearBtn">移出快捷栏</button>
  </div>

  <div class="overlay show" id="startOverlay">
    <div class="overlay-card">
      <h1>潮汐孤岛</h1>
      <p>你被困在一座会呼吸的海岛。白天采集木材、石块、纤维与食物；夜晚点燃篝火、搭建防线、对抗从海岸爬上的暗潮生物。</p>
      <ul>
        <li>砍树、采石、搜集灌木与椰子，维持饥饿和口渴。</li>
        <li>先收集材料，再把武器、工具和建造套件制作进背包与快捷栏。</li>
        <li>夜晚敌人会追踪你，篝火能提供光亮与缓慢恢复。</li>
      </ul>
      <div class="overlay-actions">
        <button class="primary" id="startBtn">开始生存</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-card">
      <h2>营地失守</h2>
      <p id="gameOverText" class="danger-text"></p>
      <div class="overlay-actions">
        <button class="primary" id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/entry.js"></script>
</body>
</html>
